services:
  mysql:
    image: mysql:8.4
    environment:
      # MYSQL_DATABASE: advance_orm
      # MYSQL_USER: root
      # MYSQL_PASSWORD: root
      # # MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: advance_orm
      MYSQL_USER: advance
      MYSQL_PASSWORD: advance
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci

volumes:
  mysql_data:
